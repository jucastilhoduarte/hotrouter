<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" width="840" height="360">
  <defs>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:0"/>
    </radialGradient>
    <filter id="btnShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#22c55e" flood-opacity="0.35"/>
    </filter>
    <filter id="dotGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#22c55e" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Screen background -->
  <rect width="840" height="360" rx="8" fill="#0d0d1a"/>
  <rect width="840" height="360" rx="8" fill="url(#bgGlow)"/>
  <rect width="840" height="360" rx="8" fill="none" stroke="#2d2d3d" stroke-width="2"/>

  <!-- Logo: estrela irradiando arcos Wi-Fi (somente o logo, maior, centralizado) -->
  <g transform="translate(420,52) scale(1.5) translate(-420,-92)">
    <!-- estrela 5 pontas centrada em 420,106 -->
    <path d="M420,99 L421.9,103.8 L427,104.2 L423.3,107.5 L424.5,112.5 L420,109.8 L415.5,112.5 L416.7,107.5 L413,104.2 L418.1,103.8 Z" fill="#F59E0B"/>
    <!-- arc 1 -->
    <path d="M409 97 Q420 89 431 97" stroke="#6366f1" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <!-- arc 2 -->
    <path d="M400 89 Q420 75 440 89" stroke="#6366f1" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.7"/>
    <!-- arc 3 -->
    <path d="M391 81 Q420 62 449 81" stroke="#6366f1" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.35"/>
  </g>

  <!-- Toggle button (largo e baixo, retangular) -->
  <rect x="150" y="104" width="540" height="100" rx="18" fill="url(#btnGrad)" filter="url(#btnShadow)"/>
  <text x="420" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="46" font-weight="800" fill="#ffffff" letter-spacing="6">LIGADO</text>
  <text x="420" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="rgba(255,255,255,0.6)" letter-spacing="1">toque para desligar</text>

  <!-- Route chip -->
  <rect x="290" y="218" width="260" height="40" rx="20" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.28)" stroke-width="1.5"/>
  <circle cx="318" cy="238" r="7" fill="#22c55e" filter="url(#dotGlow)"/>
  <text x="334" y="244" font-family="system-ui,sans-serif" font-size="18" font-weight="500" fill="#86efac" letter-spacing="0.5">Trafegando via Starlink</text>

  <!-- Botão Logs (ícone à esquerda, texto à direita) -->
  <rect x="255" y="274" width="120" height="52" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- ícone lista -->
  <line x1="278" y1="294" x2="298" y2="294" stroke="#94a3b8" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="278" y1="300" x2="295" y2="300" stroke="#94a3b8" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="278" y1="306" x2="292" y2="306" stroke="#94a3b8" stroke-width="2.4" stroke-linecap="round"/>
  <text x="308" y="307" font-family="system-ui,sans-serif" font-size="18" fill="#94a3b8" letter-spacing="0.5">Logs</text>

  <!-- Botão Configurações (ícone à esquerda, texto à direita) -->
  <rect x="395" y="274" width="190" height="52" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- ícone engrenagem simples -->
  <circle cx="420" cy="300" r="8" fill="none" stroke="#94a3b8" stroke-width="2.4"/>
  <circle cx="420" cy="300" r="3" fill="#94a3b8"/>
  <text x="438" y="307" font-family="system-ui,sans-serif" font-size="18" fill="#94a3b8" letter-spacing="0.5">Configurações</text>

  <!-- Ratio label -->
  <text x="828" y="352" text-anchor="end" font-family="system-ui,sans-serif" font-size="9" fill="#2a2a3a" letter-spacing="1">21:9 · Starlink Router v1</text>
</svg>
